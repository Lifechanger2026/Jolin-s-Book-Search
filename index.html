<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Should I Read Next?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Kalam:wght@300;400;700&family=Comfortaa:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FDF6EC;
      color: #3D2B1F;
      font-family: 'Comfortaa', sans-serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* HEADER */
    #site-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #site-title {
      font-family: 'Gochi Hand', cursive;
      font-size: 2.8rem;
      color: #3D2B1F;
      line-height: 1.1;
    }

    #tagline {
      font-family: 'Kalam', cursive;
      font-size: 1.15rem;
      color: #C8873A;
      margin-bottom: 0.5rem;
    }

    /* SEARCH ZONE */
    #search-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 1rem 2rem;
    }

    #book-input {
      font-family: 'Comfortaa', sans-serif;
      font-size: 1.05rem;
      padding: 0.75rem 1.25rem;
      border: 2px solid #D4B896;
      border-radius: 20px;
      background: white;
      color: #3D2B1F;
      width: 100%;
      max-width: 480px;
      outline: none;
      transition: border-color 0.2s;
    }
    #book-input:focus { border-color: #C8873A; }

    #search-btn {
      font-family: 'Kalam', cursive;
      font-size: 1.1rem;
      background: #C8873A;
      color: white;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #search-btn:hover { background: #A86E2A; }
    #search-btn:active { transform: scale(0.97); }

    #taste-btn {
      font-family: 'Kalam', cursive;
      font-size: 1rem;
      background: none;
      color: #C8873A;
      border: 2px solid #C8873A;
      padding: 0.6rem 1.6rem;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #taste-btn:hover { background: #FFF0DC; }
    #taste-btn:active { transform: scale(0.97); }

    /* RESULTS ZONE */
    #results-zone {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* LOADING & MESSAGES */
    .status-message {
      text-align: center;
      font-family: 'Kalam', cursive;
      font-size: 1.2rem;
      color: #C8873A;
      padding: 2rem;
    }

    .error-message {
      text-align: center;
      font-family: 'Kalam', cursive;
      font-size: 1.1rem;
      color: #993C1D;
      padding: 2rem;
    }

    /* CARDS GRID */
    #cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-top: 1rem;
    }

    /* Center last card if it's alone in its row (5th card) */
    #cards-grid > *:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
    }

    /* BOOK CARD */
    .book-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(61, 43, 31, 0.09);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(61, 43, 31, 0.14);
    }

    .card-cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #F5ECD8;
      display: block;
    }

    .card-cover-placeholder {
      width: 100%;
      height: 220px;
      background: #F5ECD8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-body {
      padding: 1.2rem 1.25rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .card-title {
      font-family: 'Gochi Hand', cursive;
      font-size: 1.25rem;
      color: #3D2B1F;
      line-height: 1.2;
    }

    .card-author {
      font-family: 'Gochi Hand', cursive;
      font-size: 1rem;
      color: #A86E2A;
    }

    .card-description {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.9rem;
      color: #5A3E2B;
      line-height: 1.6;
    }

    .card-blurb-label {
      font-family: 'Kalam', cursive;
      font-size: 0.95rem;
      color: #C8873A;
      margin-top: 0.4rem;
    }

    .card-blurb {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.88rem;
      color: #7A5540;
      line-height: 1.55;
      font-style: italic;
    }

    /* API KEY */
    #api-key-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    #api-key-toggle {
      background: none;
      border: 1.5px solid #C8873A;
      color: #C8873A;
      font-family: 'Kalam', cursive;
      font-size: 0.95rem;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #api-key-toggle:hover { background: #FFF0DC; }

    #api-key-form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }
    #api-key-instructions {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.8rem;
      color: #7A5C3E;
      margin: 0;
    }
    #api-key-instructions a {
      color: #C8873A;
      text-decoration: underline;
    }
    #api-key-form > div {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    #api-key-input {
      font-family: 'Comfortaa', sans-serif;
      font-size: 0.9rem;
      padding: 0.4rem 0.8rem;
      border: 1.5px solid #D4B896;
      border-radius: 12px;
      background: #FFF8F0;
      color: #3D2B1F;
      width: 280px;
      outline: none;
    }
    #api-key-input:focus { border-color: #C8873A; }

    #api-key-form button {
      font-family: 'Kalam', cursive;
      background: #C8873A;
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    #api-key-form button:hover { background: #A86E2A; }

    #api-key-status {
      font-family: 'Kalam', cursive;
      font-size: 0.85rem;
      color: #A86E2A;
    }

    #results-heading {
      font-family: 'Gochi Hand', cursive;
      font-size: 1.6rem;
      color: #3D2B1F;
      text-align: center;
      margin-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 600px) {
      #site-title { font-size: 2rem; }
      #cards-grid { grid-template-columns: 1fr; }
      #cards-grid > *:last-child:nth-child(odd) {
        grid-column: auto;
        max-width: 100%;
      }
    }

    /* MASCOT */
    #mascot {
      margin-bottom: 0.5rem;
    }
    #mascot svg {
      filter: drop-shadow(0 4px 12px rgba(61,43,31,0.12));
    }

  </style>
</head>
<body>

  <!-- HEADER -->

    <h1 id="site-title">What Should I Read Next?</h1>
    <p id="tagline">Purrsonalized picks just for you</p>

    <div id="api-key-section">
      <button id="api-key-toggle" onclick="toggleApiKey()">🔑 Groq API Key</button>
      <div id="api-key-form" style="display:none;">
        <p id="api-key-instructions">Get your free API key at <a href="https://console.groq.com" target="_blank" rel="noopener noreferrer">console.groq.com</a> → sign up → API Keys → Create API Key</p>
        <div>
          <input type="password" id="api-key-input" placeholder="gsk_..." />
          <button onclick="handleApiKeySave()">Save</button>
        </div>
      </div>
      <span id="api-key-status"></span>
    </div>
  </header>

  <!-- SEARCH ZONE -->
  <section id="search-zone">
    <input type="text" id="book-input" placeholder="Enter a book you love…" />
    <button id="search-btn" onclick="handleSearch()">Find My Next Read 🐾</button>
    <button id="taste-btn" onclick="handleTasteSearch()">Recommend Based on My Taste 🐱</button>
  </section>

  <!-- RESULTS -->
  <section id="results-zone"></section>

  <script>
    // ── State ──────────────────────────────────────────────
    let searchHistory = [];
    let apiKey = '';

    // ── Init ───────────────────────────────────────────────
    (function init() {
      const saved = localStorage.getItem('groq_api_key');
      if (saved) {
        apiKey = saved;
        document.getElementById('api-key-status').textContent = '✓ Key saved';
      }
    })();

    // ── API Key handlers ────────────────────────────────────
    function toggleApiKey() {
      const form = document.getElementById('api-key-form');
      form.style.display = form.style.display === 'none' ? 'flex' : 'none';
    }

    function handleApiKeySave() {
      const input = document.getElementById('api-key-input');
      const val = input.value.trim();
      if (!val) return;
      apiKey = val;
      localStorage.setItem('groq_api_key', val);
      document.getElementById('api-key-status').textContent = '✓ Key saved';
      document.getElementById('api-key-form').style.display = 'none';
      input.value = '';
    }

    // ── Groq API ────────────────────────────────────────────
    async function callGroq(userPrompt) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'You are a book recommendation assistant. You ONLY respond with valid JSON arrays. No markdown, no explanation, no code fences. Just the raw JSON array.' },
            { role: 'user', content: userPrompt }
          ],
          temperature: 0.7,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ── Prompt Builders ─────────────────────────────────────
    function buildSingleSearchPrompt(bookTitle) {
      return `I just finished reading "${bookTitle}" and loved it. Recommend 5 books I should read next.

Return a JSON array of exactly 5 objects with these exact keys:
- "title": book title (string)
- "author": author full name (string)
- "isbn": real ISBN-13 digits only no hyphens (string)
- "description": 2-3 sentences about the book (string)
- "why_youll_love_it": 1-2 sentences why someone who loved "${bookTitle}" will enjoy this (string)`;
    }

    function buildTastePrompt(bookTitles) {
      const list = bookTitles.map((t, i) => `${i + 1}. "${t}"`).join('\n');
      return `Someone who loved these books:
${list}

Recommend 5 books matching their overall reading taste.

Return a JSON array of exactly 5 objects with these exact keys:
- "title": book title (string)
- "author": author full name (string)
- "isbn": real ISBN-13 digits only no hyphens (string)
- "description": 2-3 sentences about the book (string)
- "why_youll_love_it": 1-2 sentences why someone with this reading taste will love it (string)`;
    }

    // ── Render ──────────────────────────────────────────────
    function showLoading() {
      document.getElementById('results-zone').innerHTML = '<p class="status-message">🐱 Sniffing out your next read…</p>';
    }

    function showError(msg) {
      document.getElementById('results-zone').innerHTML = `<p class="error-message">${escapeHtml(msg)}</p>`;
    }

    function renderCards(books) {
      const zone = document.getElementById('results-zone');
      books = books.filter(b => b && typeof b.title === 'string' && typeof b.author === 'string');
      if (books.length === 0) { showError('No books found — even cats get stumped sometimes 🙀'); return; }

      const heading = document.createElement('h2');
      heading.id = 'results-heading';
      heading.textContent = 'Your next reads 🐾';

      const grid = document.createElement('div');
      grid.id = 'cards-grid';
      const cardEls = books.map(book => renderCard(book));
      cardEls.forEach(card => grid.appendChild(card));

      zone.innerHTML = '';
      zone.appendChild(heading);
      zone.appendChild(grid);

      // Fetch real covers by title+author after rendering
      books.forEach((book, i) => fetchAndSetCover(book.title, book.author, cardEls[i]));
    }

    function renderCard(book) {
      const card = document.createElement('div');
      card.className = 'book-card';
      card.innerHTML = `
        <div class="card-cover-placeholder">🐱</div>
        <div class="card-body">
          <div class="card-title">${escapeHtml(book.title)}</div>
          <div class="card-author">by ${escapeHtml(book.author)}</div>
          <div class="card-description">${escapeHtml(book.description)}</div>
          <div class="card-blurb-label">Why you'll love it 🐱</div>
          <div class="card-blurb">${escapeHtml(book.why_youll_love_it)}</div>
        </div>`;
      return card;
    }

    async function fetchAndSetCover(title, author, cardEl) {
      try {
        const q = encodeURIComponent(`${title} ${author}`);
        const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i`);
        const data = await res.json();
        const coverId = data?.docs?.[0]?.cover_i;
        if (!coverId) return;
        const img = document.createElement('img');
        img.className = 'card-cover';
        img.alt = `Cover of ${title}`;
        img.src = `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
        img.onerror = () => img.replaceWith(Object.assign(document.createElement('div'), { className: 'card-cover-placeholder', textContent: '🐱' }));
        cardEl.querySelector('.card-cover-placeholder').replaceWith(img);
      } catch {}
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
    }

    // ── Handlers ────────────────────────────────────────────
    async function handleSearch() {
      if (!apiKey) {
        showError('Psst… 🐱 You forgot your Groq API key!');
        document.getElementById('api-key-form').style.display = 'flex';
        return;
      }
      const bookTitle = document.getElementById('book-input').value.trim();
      if (!bookTitle) return;

      showLoading();
      document.getElementById('search-btn').disabled = true;
      try {
        const books = JSON.parse(await callGroq(buildSingleSearchPrompt(bookTitle)));
        if (!Array.isArray(books) || books.length === 0) throw new Error('No books returned');
        searchHistory.push(bookTitle);
        renderCards(books);
      } catch (err) {
        if (err.message.includes('No books')) showError('No books found — even cats get stumped sometimes 🙀');
        else if (err instanceof SyntaxError) showError('Something went horribly wrong 😿 Please try again.');
        else showError(`Something went horribly wrong 😿 ${err.message}`);
      } finally {
        document.getElementById('search-btn').disabled = false;
      }
    }

    async function handleTasteSearch() {
      if (!apiKey) {
        showError('Psst… 🐱 You forgot your Groq API key!');
        document.getElementById('api-key-form').style.display = 'flex';
        return;
      }
      if (searchHistory.length === 0) { showError('Search for a few books first 🐱'); return; }

      showLoading();
      document.getElementById('taste-btn').disabled = true;
      try {
        const books = JSON.parse(await callGroq(buildTastePrompt(searchHistory)));
        if (!Array.isArray(books) || books.length === 0) throw new Error('No books returned');
        renderCards(books);
      } catch (err) {
        if (err.message.includes('No books')) showError('No books found — even cats get stumped sometimes 🙀');
        else if (err instanceof SyntaxError) showError('Something went horribly wrong 😿 Please try again.');
        else showError(`Something went horribly wrong 😿 ${err.message}`);
      } finally {
        document.getElementById('taste-btn').disabled = false;
      }
    }

    document.getElementById('book-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSearch();
    });
  </script>
</body>
</html>
